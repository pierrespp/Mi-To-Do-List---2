openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mi To Do List API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workspaces
    description: Workspace operations
  - name: sections
    description: Section operations
  - name: tasks
    description: Task operations
  - name: shifts
    description: Shift operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{slug}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get workspace by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not found
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a workspace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /workspaces/{slug}/sections:
    get:
      operationId: listSections
      tags: [sections]
      summary: List sections for a workspace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"
    post:
      operationId: createSection
      tags: [sections]
      summary: Create a section
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /workspaces/{slug}/sections/{sectionId}:
    patch:
      operationId: updateSection
      tags: [sections]
      summary: Update a section
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"
    delete:
      operationId: deleteSection
      tags: [sections]
      summary: Delete a section
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workspaces/{slug}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a workspace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /workspaces/{slug}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workspaces/{slug}/shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List shifts for a workspace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"

  /workspaces/{slug}/shifts/restart:
    post:
      operationId: restartShift
      tags: [shifts]
      summary: Restart the shift (archive current tasks, spawn recurring ones)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New shift created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /workspaces/{slug}/stats:
    get:
      operationId: getWorkspaceStats
      tags: [workspaces]
      summary: Get stats for a workspace (completed, pending, pinned count)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Workspace:
      type: object
      required: [id, slug, name, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    WorkspaceInput:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1

    Section:
      type: object
      required: [id, workspaceId, name, emoji, position, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        name:
          type: string
        emoji:
          type: string
        position:
          type: integer
        createdAt:
          type: string
          format: date-time

    SectionInput:
      type: object
      required: [name, emoji]
      properties:
        name:
          type: string
          minLength: 1
        emoji:
          type: string
        position:
          type: integer

    SectionUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        emoji:
          type: string
        position:
          type: integer

    Task:
      type: object
      required: [id, workspaceId, title, completed, priority, pinned, recurring, archived, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        sectionId:
          type: ["integer", "null"]
        shiftId:
          type: ["integer", "null"]
        title:
          type: string
        completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
        pinned:
          type: boolean
        recurring:
          type: boolean
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        sectionId:
          type: ["integer", "null"]
        priority:
          type: string
          enum: [low, medium, high]
        pinned:
          type: boolean
        recurring:
          type: boolean

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
        sectionId:
          type: ["integer", "null"]
        priority:
          type: string
          enum: [low, medium, high]
        pinned:
          type: boolean
        recurring:
          type: boolean
        archived:
          type: boolean

    Shift:
      type: object
      required: [id, workspaceId, startedAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time

    WorkspaceStats:
      type: object
      required: [total, completed, pending, pinned, recurring]
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        pinned:
          type: integer
        recurring:
          type: integer
