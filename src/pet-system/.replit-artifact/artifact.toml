kind = "web"
previewPath = "/"
title = "Mi Pet System"
version = "1.0.0"
id = "artifacts/pet-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20709

[services.development]
run = "pnpm --filter @workspace/pet-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pet-system", "run", "build" ]
publicDir = "artifacts/pet-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20709"
BASE_PATH = "/"
